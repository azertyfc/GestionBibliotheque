services:

  api:

    build: .

    container_name: gestion-bibliotheque-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - bibliotheque-network

  postgres:

    image: postgres:16

    container_name: postgres

    ports:
      - "5432:5432"

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - bibliotheque-network

volumes:

  postgres_data:

networks:

  bibliotheque-network: